function renderApp() {
  const tabsContainer = document.getElementById('tabs');
  const contentsContainer = document.getElementById('contents');

  // Render tabs
  volumes.forEach((vol, idx) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (idx === 0 ? ' active' : '');
    btn.innerHTML = `Vol. ${vol.num} | ${vol.title_zh}`;
    btn.onclick = () => switchTab(idx);
    tabsContainer.appendChild(btn);
  });

  // Render content
  volumes.forEach((vol, idx) => {
    const content = document.createElement('div');
    content.className = 'content' + (idx === 0 ? ' active' : '');
    
    let html = `
      <div class="vol-header">
        <h2>${vol.title_zh} | ${vol.title_en}</h2>
        <p>Volume ${vol.num}</p>
        <p>${vol.intro_zh} | ${vol.intro_en}</p>
      </div>
    `;

    vol.sections.forEach(section => {
      html += `
        <div class="section">
          <h3>${section.title_zh} | ${section.title_en}</h3>
      `;

      section.items.forEach((item, itemIdx) => {
        html += `
          <div class="item" onclick="this.classList.toggle('open')">
            <div style="cursor: pointer;">
              <span class="item-toggle">▶</span>
              <span class="item-title">${item.title}</span>
            </div>
            <div class="item-content">
              <div class="bilingual">
                <div class="zh-box">
                  <span class="zh-label">中文 Chinese</span>
                  <div class="zh-text">${item.zh}</div>
                  ${item.items_zh ? `<ul class="list-items">${item.items_zh.map(i => `<li>${i}</li>`).join('')}</ul>` : ''}
                </div>
                <div class="en-box">
                  <span class="en-label">English 英文</span>
                  <div class="en-text">${item.en}</div>
                  ${item.items_en ? `<ul class="list-items">${item.items_en.map(i => `<li>${i}</li>`).join('')}</ul>` : ''}
                  <button class="tts-btn" onclick="speakText('${vol.num}-${itemIdx}', event)">🔊 Play English Audio</button>
                </div>
              </div>
              ${item.content_zh ? `<div class="bilingual">
                <div class="zh-box">
                  <span class="zh-label">詳細中文</span>
                  <div class="zh-text">${item.content_zh}</div>
                </div>
                <div class="en-box">
                  <span class="en-label">Detailed English</span>
                  <div class="en-text">${item.content_en}</div>
                  <button class="tts-btn" onclick="speakText('${vol.num}-detail-${itemIdx}', event)">🔊 Play English Audio</button>
                </div>
              </div>` : ''}
            </div>
          </div>
        `;
      });

      html += `</div>`;
    });

    content.innerHTML = html;
    contentsContainer.appendChild(content);
  });
}

function switchTab(idx) {
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === idx);
  });
  document.querySelectorAll('.content').forEach((content, i) => {
    content.classList.toggle('active', i === idx);
  });
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function speakText(id, e) {
  e.stopPropagation();
  if(!('speechSynthesis' in window)) {
    alert('English audio not supported on this device');
    return;
  }

  const btn = e.target;
  const textToSpeak = allEnglishTexts[id] || btn.closest('.item-content').querySelector('.en-text').textContent;

  const utterance = new SpeechSynthesisUtterance(textToSpeak);
  utterance.rate = 0.85;
  utterance.pitch = 1;
  utterance.volume = 1;

  const voices = speechSynthesis.getVoices();
  const englishVoice = voices.find(v => v.lang.startsWith('en'));
  if(englishVoice) utterance.voice = englishVoice;

  btn.classList.add('playing');
  utterance.onend = () => btn.classList.remove('playing');
  utterance.onerror = () => {
    btn.classList.remove('playing');
    console.error('TTS error');
  };

  speechSynthesis.cancel();
  speechSynthesis.speak(utterance);
}

window.addEventListener('load', () => {
  speechSynthesis.getVoices();
  renderApp();
});
