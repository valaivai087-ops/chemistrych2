        }

            gap: 1.5rem;
            padding: 2rem 1.5rem;
            max-width: 1400px;
            margin: 0 auto;
        }

            background: white;

            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            cursor: pointer;

            padding: 1.5rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }

            font-weight: 700;
            background: var(--gold);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 1rem;
            flex-shrink: 0;

        }

            font-size: 1.2rem;
            font-weight: 700;

            font-size: 0.95rem;
            opacity: 0.9;

            margin-left: 1rem;
            flex-shrink: 0;
        }

        }

            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }

            max-height: 3000px;

            padding: 1.5rem;
            border-top: 1px solid var(--border-light);
        }

            border-top: none;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--navy);
            margin-bottom: 1rem;

            border-radius: 8px;
            border-left: 3px solid var(--teal);
            font-size: 0.9rem;
            line-height: 1.5;

const allModels = [...ALL_MODELS, ...MODELS_7_30];

// ========== Render Functions ==========
function renderModels(data) {
    const container = document.getElementById('modelsContainer');
    container.innerHTML = '';
    
    if (!data || data.length === 0) {
        container.innerHTML = '<div class="empty-state"><h3>未找到 | Not Found</h3></div>';
        return;
    }
    
    data.forEach(model => {
        const card = createCard(model);
        container.appendChild(card);
    });
}

function createCard(model) {
    const card = document.createElement('div');
    card.className = 'model-card';
    
    const wisdomsHtml = model.wisdoms.map((w, i) => {
        const en = model.wisdoms_en[i];
        return `<div class="wisdom-item">
            <span class="item-num">${String(i+1).padStart(2, '0')}</span>
            <div style="margin-bottom: 0.3rem; font-weight: 600; color: var(--navy);">${w}</div>
            <div style="font-size: 0.85rem; color: var(--teal); font-style: italic;">${en}
                <button class="tts-btn" onclick="speakText('${en.replace(/'/g, "\\'")}', this)">🔊</button>
            </div>
        </div>`;
    }).join('');
    
    const capabilitiesHtml = model.capabilities.map((c, i) => {
        const en = model.capabilities_en[i];
        return `<div class="capability-item">
            <span class="item-num">${String(i+1).padStart(2, '0')}</span>
            <div style="margin-bottom: 0.3rem; font-weight: 600; color: var(--navy);">${c}</div>
            <div style="font-size: 0.85rem; color: var(--teal); font-style: italic;">${en}
                <button class="tts-btn" onclick="speakText('${en.replace(/'/g, "\\'")}', this)">🔊</button>
            </div>
        </div>`;
    }).join('');
    
    card.innerHTML = `
        <div class="model-header">
            <div class="model-number">${model.num}</div>
            <div class="model-title">
                <span class="ch">${model.ch}</span>
                <span class="en">${model.en}</span>
            </div>
            <div class="expand-icon">▼</div>
        </div>
        <div class="model-content">
            <div class="section">
                <div class="section-title">💡 一句話定義 | Definition</div>
                <div class="definition">
                    <div class="ch">${model.def_ch}</div>
                    <div class="en">${model.def_en}</div>
                </div>
            </div>
            <div class="section">
                <div class="section-title">🧠 智慧 30 句 | 30 Wisdoms</div>
                <div class="wisdoms-list">${wisdomsHtml}</div>
            </div>
            <div class="section">
                <div class="section-title">⚡ 能力行為 30 項 | 30 Capabilities</div>
                <div class="capabilities-list">${capabilitiesHtml}</div>
            </div>
        </div>
    `;
    
    card.querySelector('.model-header').addEventListener('click', () => {
        card.classList.toggle('expanded');
    });
    
    return card;
}

function speakText(text, button) {
    if (!window.speechSynthesis) return;
    
    if (button.classList.contains('playing')) {
        window.speechSynthesis.cancel();
        button.classList.remove('playing');
        return;
    }
    
    button.classList.add('playing');
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'en-US';
    utterance.rate = 0.95;
    utterance.onend = () => button.classList.remove('playing');
    window.speechSynthesis.speak(utterance);
}

// ========== Event Listeners ==========
document.getElementById('searchInput').addEventListener('input', (e) => {
    const query = e.target.value.toLowerCase();
    const filtered = allModels.filter(m => 
        m.ch.includes(query) || m.en.toLowerCase().includes(query) || m.num.includes(query)
    );
    renderModels(filtered);
});

document.getElementById('expandAllBtn').addEventListener('click', () => {
    document.querySelectorAll('.model-card').forEach(c => c.classList.add('expanded'));
});

document.getElementById('collapseAllBtn').addEventListener('click', () => {
    document.querySelectorAll('.model-card').forEach(c => c.classList.remove('expanded'));
});

// ========== Initialize ==========
renderModels(allModels);
</script>
